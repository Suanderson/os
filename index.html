<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iPlace – Assistência Técnica</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="logo-ring">
      <svg viewBox="0 0 24 24" fill="white"><text x="1" y="18" font-size="12" font-family="sans-serif" font-weight="700">iP</text></svg>
    </div>
    <div class="apple-badge">
      <svg viewBox="0 0 814 1000" fill="white" width="16" height="16"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.3 269-317.3 70.1 0 128.4 46.4 172.5 46.4 43.2 0 110.6-49 191.4-49 30.8 0 133.6 2.8 200.6 106.3zm-37.8-235.5c24.4-29 41.5-69.6 41.5-110.1 0-5.6-.6-11.1-1.6-15.6-39.3 1.5-85.9 26.1-113.4 58.3-22.4 26.1-43.6 66.6-43.6 107.8 0 6.2 1 12.3 1.6 14.2 2.8.5 7.4 1 11.9 1 35.1 0 79.4-23.2 103.6-55.6z"/></svg>
      <span>Premium Reseller</span>
    </div>
    <span class="brand-title">Assistência Técnica</span>
  </div>

  <ul class="nav-links">
    <li><a href="#">Agendamento</a></li>
    <li><a href="#" class="active">Consulta</a></li>
  </ul>

  <a href="https://wa.me/" class="nav-whatsapp" target="_blank">
    <div class="wa-icon">
      <svg viewBox="0 0 24 24" fill="white" width="13" height="13"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.555 4.122 1.524 5.858L.057 23.404a.75.75 0 0 0 .904.94l5.696-1.484A11.954 11.954 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.698 9.698 0 0 1-4.953-1.355l-.354-.212-3.583.934.955-3.486-.231-.369A9.698 9.698 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
    </div>
    <span>Fale conosco pelo WhatsApp</span>
  </a>
</nav>

<main class="hero">
  <p class="hero-eyebrow">Portal de Atendimento</p>
  <h1 class="hero-title">Consulte o status do seu <strong>dispositivo</strong></h1>
  <p class="hero-sub">Informe seu número de ordem de serviço e documento para continuar.</p>

  <div class="card">
    <div class="field">
      <label for="os">Número da Ordem de Serviço</label>
      <input id="os" type="text" placeholder="Digite o número de OS. Ex: 789" autocomplete="off"/>
    </div>

    <div class="field">
      <label for="telefone">Número do Documento</label>
      <input id="telefone" type="text" placeholder="Digite o número do seu documento" autocomplete="off"/>
    </div>

    <button class="btn-consultar" onclick="consultarOS()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Consultar
    </button>
  </div>

  <!-- LOADING -->
  <div id="loading" style="display:none;">
    <div class="loading-card">
      <div class="spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-logo">
          <svg viewBox="0 0 24 24" fill="#b5d400" width="18" height="18"><text x="1" y="18" font-size="12" font-family="sans-serif" font-weight="700">iP</text></svg>
        </div>
      </div>
      <p class="loading-text">Consultando ordem de serviço<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
    </div>
  </div>

  <!-- RESULTADO -->
  <div id="resultado"></div>

</main>

<script src="script.js"></script>
</body>
</html>
