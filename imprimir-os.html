<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Imprimir OS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: #e8e8e8;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── BOTÃO IMPRIMIR (some na impressão) ── */
    .btn-print {
      position: fixed;
      top: 20px; right: 20px;
      padding: 10px 22px;
      background: #1e5f8c;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
    }
    .btn-print:hover { background: #174e75; }

    /* ── FOLHA A5 ── */
    .folha {
      background: #fff;
      width: 148mm;
      min-height: 210mm;
      padding: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── CABEÇALHO ── */
    .cab {
      background: #c8daea;
      padding: 16px 20px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .cab-titulo {
      font-size: 20px;
      font-weight: 700;
      color: #1e5f8c;
      line-height: 1.15;
    }

    .cab-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .cab-logo img {
      height: 40px;
      width: auto;
    }

    .cab-logo-texto {
      font-size: 12px;
      font-weight: 700;
      color: #1e5f8c;
      line-height: 1.3;
    }

    /* ── LINHA OS + QR ── */
    .info-topo {
      padding: 10px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid #dce8f0;
    }

    .info-topo-esq { display: flex; flex-direction: column; gap: 6px; }

    .tag {
      background: #dce8f5;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      color: #1e5f8c;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .tag strong { font-weight: 700; color: #0a2e47; font-size: 12px; }

    .qr-wrap { text-align: center; flex-shrink: 0; }
    .qr-wrap img { width: 56px; height: 56px; display: block; }
    .qr-wrap small { font-size: 8px; color: #999; display: block; margin-top: 2px; }

    /* ── SEÇÃO ── */
    .secao { padding: 10px 20px; border-bottom: 1px solid #dce8f0; }

    .secao-titulo {
      font-size: 12px;
      font-weight: 700;
      color: #1e5f8c;
      margin-bottom: 8px;
    }

    .linha-dado {
      display: flex;
      gap: 6px;
      font-size: 11px;
      color: #444;
      margin-bottom: 5px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .linha-dado .label { color: #777; flex-shrink: 0; }
    .linha-dado strong { color: #0a2e47; font-weight: 700; }

    .linha-dupla {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .area-texto {
      font-size: 11px;
      color: #444;
      min-height: 28px;
      margin-top: 2px;
      line-height: 1.5;
    }

    .area-vazia {
      min-height: 32px;
      border-bottom: 1px dashed #ccc;
      margin-top: 4px;
      margin-bottom: 4px;
    }

    /* ── TABELA PEÇAS ── */
    .tabela-pecas {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 6px;
    }

    .tabela-pecas th {
      color: #1e5f8c;
      font-weight: 700;
      padding: 4px 0;
      border-bottom: 1px solid #c8daea;
      text-align: left;
    }

    .tabela-pecas th:last-child,
    .tabela-pecas td:last-child { text-align: right; }

    .tabela-pecas td {
      padding: 4px 0;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }

    .tabela-vazia td {
      color: #bbb;
      font-style: italic;
      padding: 8px 0;
    }

    .total-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #0a2e47;
    }

    /* ── RODAPÉ ── */
    .rodape {
      margin-top: auto;
      background: #c8daea;
      padding: 8px 20px;
      text-align: center;
      font-size: 9px;
      color: #4a6e88;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      font-size: 14px;
      color: #888;
    }

    /* ── PRINT ── */
    @media print {
      body { background: none; padding: 0; }
      .btn-print { display: none; }
      .folha {
        box-shadow: none;
        width: 148mm;
        min-height: 210mm;
      }
      @page { size: A5 portrait; margin: 0; }
    }
  </style>
</head>
<body>

<button class="btn-print" onclick="window.print()">🖨️ Imprimir</button>

<div class="folha" id="folha">
  <div class="loading" id="loading">Carregando OS...</div>
</div>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbyGIGOxXHGtxXj5b4WHxbIU7IluC-Y7JWuZR_o1Dz0/exec";
const URL_SITE = "https://suanderson.github.io/os-acompamento/";
const ENDERECO = "Tabocas, Espírito Santo - RN";

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function jsonp(url, cb, fn) {
  window[cb] = function(data) { fn(data); delete window[cb]; };
  const s = document.createElement("script");
  s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb;
  s.onerror = function() { document.getElementById("loading").textContent = "Erro ao carregar OS."; };
  document.body.appendChild(s);
}

function formatarMoeda(v) {
  const n = parseFloat(v) || 0;
  return "R$ " + n.toFixed(2).replace(".", ",");
}

function gerarQRUrl(osNum) {
  const url = URL_SITE + "?os=" + osNum;
  return "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(url);
}

function renderOS(d) {
  const folha = document.getElementById("folha");

  // monta linhas de peças/serviços
  // desc_servico e pecas são campos simples — monta 1 linha de serviço + 1 de peça se existirem
  let linhasPecas = "";
  let total = parseFloat(d.valor_total) || 0;

  if (d.desc_servico || d.valor_servico) {
    linhasPecas += `
      <tr>
        <td>${d.desc_servico || "Serviço"}</td>
        <td>${formatarMoeda(d.valor_servico)}</td>
      </tr>`;
  }
  if (d.pecas || d.valor_peca) {
    linhasPecas += `
      <tr>
        <td>${d.pecas || "Peças"}</td>
        <td>${formatarMoeda(d.valor_peca)}</td>
      </tr>`;
  }
  if (!linhasPecas) {
    linhasPecas = `<tr class="tabela-vazia"><td colspan="2">Nenhum item registrado</td></tr>`;
  }

  const recebimento = d.entrada_data
    ? (d.entrada_data + (d.entrada_hora ? ", " + d.entrada_hora : ""))
    : "—";

  folha.innerHTML = `
    <!-- CABEÇALHO -->
    <div class="cab">
      <div class="cab-titulo">ORDEM<br>DE SERVIÇO</div>
      <div class="cab-logo">
        <img src="Logo.png" alt="SI" onerror="this.style.display='none'"/>
        <div class="cab-logo-texto">Suanderson<br>Informática</div>
      </div>
    </div>

    <!-- OS + QR -->
    <div class="info-topo">
      <div class="info-topo-esq">
        <div class="tag">Ordem de Serviço N°: <strong>${d.os}</strong></div>
        <div class="tag">Recebimento: <strong>${recebimento}</strong></div>
      </div>
      <div class="qr-wrap">
        <img src="${gerarQRUrl(d.os)}" alt="QR Code"/>
        <small>Acompanhe seu Atendimento</small>
      </div>
    </div>

    <!-- CLIENTE -->
    <div class="secao">
      <div class="secao-titulo">Informações do Cliente</div>
      <div class="linha-dupla">
        <div class="linha-dado"><span class="label">Nome:</span> <strong>${d.cliente || "—"}</strong></div>
        <div class="linha-dado"><span class="label">Telefone:</span> <strong>${d.telefone || "—"}</strong></div>
      </div>
      <div class="linha-dupla">
        <div class="linha-dado"><span class="label">Email:</span> <strong>${d.email || "—"}</strong></div>
        <div class="linha-dado"><span class="label">Documento:</span> <strong>${d.documento || "—"}</strong></div>
      </div>
    </div>

    <!-- PRODUTO -->
    <div class="secao">
      <div class="secao-titulo">Informações do Produto</div>
      <div class="linha-dado"><span class="label">Produto:</span> <strong>${d.produto || "—"}</strong></div>
      <div class="linha-dado"><span class="label">Detalhes:</span> <strong>${d.desc_produto || "—"}</strong></div>
    </div>

    <!-- PROBLEMA + PARECER -->
    <div class="secao">
      <div class="linha-dado" style="margin-bottom:6px">
        <strong>Descrição do Problema:</strong>
      </div>
      <div class="area-texto">${d.desc_problema || '<div class="area-vazia"></div>'}</div>
      <div class="linha-dado" style="margin-top:8px;margin-bottom:6px">
        <strong>Parecer Técnico:</strong>
      </div>
      <div class="area-texto">${d.parecer || '<div class="area-vazia"></div>'}</div>
    </div>

    <!-- PEÇAS E SERVIÇOS -->
    <div class="secao" style="flex:1">
      <div class="secao-titulo">Peças e Serviços</div>
      <table class="tabela-pecas">
        <thead>
          <tr><th>Descrição</th><th>Valor</th></tr>
        </thead>
        <tbody>${linhasPecas}</tbody>
      </table>
      <div class="total-row">TOTAL: ${formatarMoeda(total)}</div>
    </div>

    <!-- RODAPÉ -->
    <div class="rodape">
      ${ENDERECO} — ${URL_SITE}
    </div>
  `;
}

// ── INIT ──
const osNum = getParam("os");
if (!osNum) {
  document.getElementById("loading").textContent = "Nenhuma OS informada na URL.";
} else {
  const url = URL_API + "?acao=buscarOS&os=" + osNum;
  jsonp(url, "cbImprimir", function(dados) {
    if (!dados.encontrado) {
      document.getElementById("loading").textContent = "OS não encontrada.";
      return;
    }
    renderOS(dados);
    // pequeno delay para fontes carregarem antes de imprimir
    setTimeout(function() {
      if (getParam("print") === "1") window.print();
    }, 800);
  });
}
</script>
</body>
</html>
